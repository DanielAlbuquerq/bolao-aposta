<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Bolão Noruega</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header-nav">
            <h1 style="color: #fff; font-size: 1.5rem; flex: 1;">Área do Administrador</h1>
            <a href="/" style="color: #bcf3b2; font-weight: bold; text-decoration: none;">Ver Público ➔</a>
        </header>

        <section class="bet-form">
            <h3 style="margin-bottom: 15px; color: #0f172a;">Registar Nova Aposta (Paga)</h3>
            <form id="form-aposta">
                <div class="form-group">
                    <label>Nome do Apostador</label>
                    <input type="text" id="nome" placeholder="Ex: Daniel Doce" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="(11) 99999-9999">
                </div>
                
                <div class="bet-box">
                    <h4>Placar (BR x NO)</h4>
                    <div class="inputs-inline">
                        <input type="number" id="gols-br" placeholder="BR" required min="0">
                        <span style="align-self: center; font-weight: bold;">X</span>
                        <input type="number" id="gols-no" placeholder="NO" required min="0">
                    </div>
                </div>

              <div class="bet-box">
                    <h4>Desempate</h4>
                    <div class="form-group">
                        <label>Sairá gol no 1º tempo?</label>
                        <select id="gol-1t" required style="padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; width: 100%;">
                            <option value="" disabled selected>Escolha a opção...</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Gravar Aposta</button>
            </form>
        </section>

        <section class="participants-section" style="padding: 20px;">
            <h3 style="margin-bottom: 10px; color: #0f172a;">Apostas Registadas</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>BRxNO</th>
                            <th>1ºT</th>
                        </tr>
                    </thead>
                    <tbody id="lista-admin">
                        </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="admin.js"></script>
</body>
</html>
